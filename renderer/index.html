<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技术黑话翻译器 · 实时路演生成器</title>
<style>
/* ============ CSS Variables & Reset ============ */
:root {
  --bg-deep: #060a13;
  --bg-card: rgba(15, 23, 42, 0.85);
  --bg-card-hover: rgba(20, 30, 55, 0.92);
  --border-subtle: rgba(99, 102, 241, 0.15);
  --border-glow: rgba(99, 102, 241, 0.5);
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent-indigo: #6366f1;
  --accent-purple: #8b5cf6;
  --accent-cyan: #06b6d4;
  --accent-amber: #f59e0b;
  --accent-emerald: #10b981;
  --accent-rose: #f43f5e;
  --gradient-main: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
  --gradient-dark: linear-gradient(135deg, #1e1b4b 0%, #0f172a 50%, #020617 100%);
  --gradient-card: linear-gradient(145deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.95) 100%);
  --glow-indigo: 0 0 30px rgba(99, 102, 241, 0.3);
  --glow-purple: 0 0 40px rgba(139, 92, 246, 0.25);
  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 24px;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ============ Particle Background ============ */
#particles-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}

/* ============ Main Container ============ */
.app-container {
  position: relative; z-index: 1;
  max-width: 1100px; margin: 0 auto; padding: 40px 24px 60px;
}

/* ============ Header ============ */
.header {
  text-align: center; margin-bottom: 36px;
}
.header .badge {
  display: inline-block;
  background: rgba(99, 102, 241, 0.12);
  border: 1px solid var(--border-subtle);
  color: var(--accent-indigo);
  font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em;
  padding: 5px 14px; border-radius: 20px; margin-bottom: 16px;
}
.header h1 {
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 800; letter-spacing: -0.02em;
  background: var(--gradient-main);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.header .subtitle {
  font-size: 1.05rem; color: var(--text-secondary);
  font-weight: 400; letter-spacing: 0.02em;
}

/* ============ Input Section ============ */
.input-section {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 28px 32px;
  margin-bottom: 28px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition: border-color 0.3s, box-shadow 0.3s;
}
.input-section:focus-within {
  border-color: var(--border-glow);
  box-shadow: var(--glow-indigo);
}
.input-row {
  display: flex; gap: 12px; align-items: center;
}
.input-row input {
  flex: 1;
  background: rgba(0, 0, 0, 0.35);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 1.05rem; padding: 14px 20px;
  outline: none; transition: border-color 0.25s, box-shadow 0.25s;
  font-family: inherit;
}
.input-row input::placeholder { color: var(--text-muted); }
.input-row input:focus {
  border-color: var(--accent-indigo);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
}
.btn-generate {
  display: flex; align-items: center; gap: 8px;
  background: var(--gradient-main);
  border: none; color: #fff;
  font-size: 1rem; font-weight: 700;
  padding: 14px 28px; border-radius: var(--radius-sm);
  cursor: pointer; white-space: nowrap;
  transition: transform 0.2s, box-shadow 0.3s, opacity 0.2s;
  letter-spacing: 0.03em;
}
.btn-generate:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
}
.btn-generate:active { transform: scale(0.97); }
.btn-generate:disabled {
  opacity: 0.6; cursor: not-allowed; transform: none;
}

.quick-tags {
  display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px;
}
.quick-tag {
  background: rgba(99, 102, 241, 0.08);
  border: 1px solid rgba(99, 102, 241, 0.2);
  color: var(--text-secondary);
  font-size: 0.8rem; padding: 6px 14px; border-radius: 20px;
  cursor: pointer; transition: all 0.2s;
}
.quick-tag:hover {
  background: rgba(99, 102, 241, 0.18);
  border-color: var(--accent-indigo);
  color: var(--text-primary);
}

/* ============ Loading State ============ */
.loading-overlay {
  display: none; text-align: center; padding: 50px 20px;
}
.loading-overlay.active { display: block; }
.loading-spinner {
  width: 48px; height: 48px;
  border: 3px solid rgba(99, 102, 241, 0.2);
  border-top-color: var(--accent-indigo);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  color: var(--text-secondary); font-size: 0.95rem;
}
.loading-dots::after {
  content: '';
  animation: dots 1.5s steps(3, end) infinite;
}
@keyframes dots {
  0%   { content: ''; }
  33%  { content: '.'; }
  66%  { content: '..'; }
  100% { content: '...'; }
}

/* ============ Results Container ============ */
.results {
  display: none;
}
.results.active { display: block; }

/* Section Title */
.section-label {
  display: flex; align-items: center; gap: 10px;
  font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--accent-indigo);
  margin-bottom: 14px;
}
.section-label::after {
  content: '';
  flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(99, 102, 241, 0.3), transparent);
}

/* ============ One-Liner Card ============ */
.one-liner-card {
  background: var(--gradient-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 28px 32px; margin-bottom: 20px;
  position: relative; overflow: hidden;
  backdrop-filter: blur(16px);
}
.one-liner-card::before {
  content: '';
  position: absolute; top: 0; left: 0; width: 4px; height: 100%;
  background: var(--gradient-main); border-radius: 4px 0 0 4px;
}
.one-liner-card .icon-label {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--accent-amber); font-size: 0.85rem; font-weight: 600;
  margin-bottom: 12px;
}
.one-liner-card .value-text {
  font-size: 1.35rem; font-weight: 700; line-height: 1.5;
  color: #f1f5f9;
}
.tech-name-highlight {
  background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
  color: var(--accent-purple); padding: 2px 8px; border-radius: 4px;
  font-weight: 800;
}

/* ============ Scenario Cards ============ */
.scenarios-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px; margin-bottom: 20px;
}
.scenario-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 24px 22px;
  backdrop-filter: blur(12px);
  transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
  position: relative;
}
.scenario-card:hover {
  transform: translateY(-3px);
  border-color: var(--border-glow);
  box-shadow: var(--glow-indigo);
}
.scenario-card .sc-num {
  font-family: var(--font-mono);
  font-size: 0.75rem; font-weight: 700; color: var(--accent-indigo);
  margin-bottom: 8px; letter-spacing: 0.05em;
}
.scenario-card .sc-title {
  font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; color: #f1f5f9;
}
.scenario-card .sc-desc {
  font-size: 0.88rem; color: var(--text-secondary);
  line-height: 1.55; margin-bottom: 14px;
}
.scenario-card .sc-market {
  display: inline-block;
  background: rgba(245, 158, 11, 0.1);
  border: 1px solid rgba(245, 158, 11, 0.25);
  color: var(--accent-amber);
  font-size: 0.82rem; font-weight: 700; padding: 4px 12px; border-radius: 6px;
}

/* ============ Pitch Structure ============ */
.pitch-structure {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 28px 32px;
  backdrop-filter: blur(16px);
}
.pitch-flow {
  display: flex; align-items: flex-start; gap: 0;
  overflow-x: auto; padding: 10px 0;
}
.pitch-step {
  flex: 1; min-width: 150px; position: relative;
  text-align: center; padding: 0 8px;
}
.pitch-step:not(:last-child)::after {
  content: '→';
  position: absolute; right: -8px; top: 18px;
  color: var(--accent-indigo); font-size: 1.2rem; font-weight: 700;
}
.pitch-step .step-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px; font-size: 1.2rem;
  background: rgba(99, 102, 241, 0.12);
  border: 1px solid var(--border-subtle);
}
.pitch-step .step-label {
  font-size: 0.8rem; font-weight: 700; color: var(--accent-indigo);
  letter-spacing: 0.04em; margin-bottom: 6px;
}
.pitch-step .step-content {
  font-size: 0.85rem; color: var(--text-secondary);
  line-height: 1.5;
}

/* ============ Toolbar ============ */
.toolbar {
  display: flex; gap: 10px; justify-content: flex-end;
  margin-top: 20px;
}
.btn-tool {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary);
  font-size: 0.78rem; padding: 8px 16px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
}
.btn-tool:hover {
  background: rgba(255,255,255,0.08);
  color: var(--text-primary);
}

/* ============ Settings Panel ============ */
.settings-toggle {
  position: fixed; bottom: 24px; right: 24px; z-index: 100;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(15, 23, 42, 0.9);
  border: 1px solid var(--border-subtle);
  color: var(--text-muted);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.3s; font-size: 1rem;
}
.settings-toggle:hover { color: var(--text-primary); border-color: var(--border-glow); }
.settings-panel {
  position: fixed; bottom: 80px; right: 24px; z-index: 100;
  background: rgba(15, 23, 42, 0.96);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md); padding: 20px; width: 300px;
  display: none; backdrop-filter: blur(20px);
}
.settings-panel.active { display: block; }
.settings-panel label {
  display: block; font-size: 0.78rem; color: var(--text-muted);
  margin-bottom: 4px; font-weight: 600;
}
.settings-panel input, .settings-panel select {
  width: 100%; background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; color: var(--text-primary);
  padding: 8px 12px; font-size: 0.82rem; margin-bottom: 12px;
  outline: none; font-family: inherit;
}
.settings-panel .note {
  font-size: 0.72rem; color: var(--text-muted);
  margin-top: -8px; margin-bottom: 12px;
}
.api-status {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 0.75rem; padding: 3px 8px; border-radius: 10px;
  margin-left: 8px;
}
.api-status.on {
  background: rgba(16, 185, 129, 0.12); color: var(--accent-emerald);
}
.api-status.off {
  background: rgba(100, 116, 139, 0.12); color: var(--text-muted);
}

/* ============ Presentation Mode ============ */
.present-mode .input-section,
.present-mode .header .badge,
.present-mode .header .subtitle,
.present-mode .toolbar,
.present-mode .settings-toggle,
.present-mode .quick-tags { display: none !important; }
.present-mode .header h1 { font-size: 2rem; }
.present-mode .app-container { padding: 20px 40px; }
.present-mode .results { display: block !important; }
.present-exit {
  display: none; position: fixed; top: 16px; right: 24px; z-index: 200;
  background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.15);
  color: #fff; padding: 6px 14px; border-radius: 8px; cursor: pointer;
  font-size: 0.8rem;
}
.present-mode .present-exit { display: block; }

/* ============ Animations ============ */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.92); }
  to { opacity: 1; transform: scale(1); }
}
.anim-fade-up {
  animation: fadeInUp 0.5s ease forwards;
  opacity: 0;
}
.anim-scale-in {
  animation: scaleIn 0.4s ease forwards;
  opacity: 0;
}
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }
.delay-3 { animation-delay: 0.3s; }
.delay-4 { animation-delay: 0.4s; }

/* ============ Responsive ============ */
@media (max-width: 768px) {
  .scenarios-grid { grid-template-columns: 1fr; }
  .pitch-flow { flex-wrap: wrap; }
  .pitch-step:not(:last-child)::after { display: none; }
  .pitch-step { min-width: 100%; margin-bottom: 12px; }
  .input-row { flex-direction: column; }
  .btn-generate { width: 100%; justify-content: center; }
}
@media (min-width: 1400px) {
  .app-container { max-width: 1300px; }
  .scenarios-grid { gap: 24px; }
}
</style>
</head>
<body>
<canvas id="particles-canvas"></canvas>

<div class="present-exit" onclick="togglePresentation()">✕ 退出演示模式</div>

<div class="app-container">
  <!-- Header -->
  <header class="header">
    <div class="badge">AI + 硬科技智造 · 第4组</div>
    <h1>技术黑话翻译器 × 实时路演生成器</h1>

  <section class="input-section" id="inputSection">

      <span class="quick-tag" data-term="纳米级精密定位平台">纳米级精密定位平台</span>
      <span class="quick-tag" data-term="液态金属柔性电路">液态金属柔性电路</span>
      <span class="quick-tag" data-term="量子点光谱芯片">量子点光谱芯片</span>
      <span class="quick-tag" data-term="脑机接口运动解码">脑机接口运动解码</span>
    </div>
  </section>

  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">

  <!-- Results -->
  <div class="results" id="results">

    <div class="section-label">🎯 三大应用场景 & 市场规模</div>

    <div class="pitch-structure anim-fade-up delay-3">

        <!-- filled by JS -->
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="btn-tool" onclick="togglePresentation()">📺 演示模式</button>
      <button class="btn-tool" onclick="copyContent()">📋 复制内容</button>
      <button class="btn-tool" onclick="resetAll()">🔄 重新生成</button>

  </div>
</div>

<!-- Settings -->

  <label>引擎模式</label>
  <select id="engineMode" onchange="onEngineChange()">
    <option value="builtin">内置引擎（离线可用）</option>

  </select>

    <label>API Endpoint</label>
    <input type="text" id="apiEndpoint" placeholder="https://api.openai.com/v1/chat/completions">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="sk-...">

</div>

<script>
// ============ Particle Background ============
(function() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let w, h;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() {
      this.reset();
      this.y = Math.random() * h;
    }
    reset() {
      this.x = Math.random() * w;
      this.y = -10;
      this.size = Math.random() * 1.8 + 0.5;
      this.speed = Math.random() * 0.4 + 0.15;
      this.opacity = Math.random() * 0.5 + 0.1;
    }
    update() {
      this.y += this.speed;
      if (this.y > h + 10) this.reset();
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(99, 102, 241, ${this.opacity})`;
      ctx.fill();
    }
  }

  for (let i = 0; i < 60; i++) {
    particles.push(new Particle());
  }

  function animate() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animate);
  }
  animate();
})();

// ============ Knowledge Base ============
const KNOWLEDGE = {
  // 触觉传感器
  tactile_sensor: {
    keywords: ['触觉', '传感器', '力觉', '压力', '阵列', '柔性', '压阻', '电容', '压电', '触感'],
    oneLiner: (term) => `"${term}"——让机器拥有比人类指尖更灵敏的「触觉」，实现微米级力感知与物体识别，是机器人从"眼明手瞎"走向"眼手协同"的最后一公里核心技术。`,
    scenarios: [
      { title: '工业自动化精密装配', desc: '电子元器件微米级贴合、汽车精密零部件组装，替代人工完成高重复性精密操作，良率从85%提升到99.5%。', market: '全球 ¥500亿+' },
      { title: '微创手术机器人', desc: '触觉反馈让手术机器人"感知"组织硬度与血管搏动，实现零失误精细操作，大幅降低手术并发症。', market: '全球 ¥2000亿+' },
      { title: '消费电子 & 人机交互', desc: '下一代手机/VR手套的触觉反馈模组，让虚拟世界"摸得着"，开启触觉互联网时代。', market: '全球 ¥300亿+' }
    ],
    pitch: [
      { icon: '⚠️', label: '问题', content: '传统机器人"眼明手瞎"，90%精密装配仍需人工。传感器精度不足导致抓取失败率高，限制智造升级。' },

// ============ Translation Engine ============
function findBestMatch(term) {
  const lower = term.toLowerCase();
  let best = null;
  let bestScore = 0;

  for (const [key, domain] of Object.entries(KNOWLEDGE)) {
    let score = 0;
    for (const kw of domain.keywords) {
      if (lower.includes(kw.toLowerCase())) score += kw.length;
    }
    if (score > bestScore) {
      bestScore = score;
      best = key;
    }
  }

  return bestScore > 0 ? KNOWLEDGE[best] : null;
}

function translateBuiltin(term) {
  const domain = findBestMatch(term);
  if (domain) {
    return {
      oneLiner: domain.oneLiner(term),
      scenarios: domain.scenarios,
      pitch: domain.pitch
    };
  }
  return {
    oneLiner: FALLBACK.oneLiner(term),
    scenarios: FALLBACK.scenarios,
    pitch: FALLBACK.pitch
  };
}

// ============ API Integration ============
async function translateAPI(term) {
  const endpoint = document.getElementById('apiEndpoint').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();
  const model = document.getElementById('apiModel').value.trim();

  if (!endpoint || !apiKey) {
    throw new Error('请先在设置中配置 API Endpoint 和 Key');
  }

  const prompt = `你是一个顶级VC的分析师。现在有一个硬科技团队向你介绍一项技术："${term}"。

请用中文输出以下内容，格式为JSON：

{
  "oneLiner": "一句话大白话价值翻译（让投资人秒懂这个技术为什么值钱，不要用技术术语，用商业语言，30字以内）",
  "scenarios": [
    {"title": "场景标题", "desc": "为什么这个技术在这个场景值钱（30-50字）", "market": "全球市场规模（带¥符号）"},
    {"title": "场景标题", "desc": "...", "market": "..."},
    {"title": "场景标题", "desc": "...", "market": "..."}
  ],
  "pitch": [
    {"icon": "⚠️", "label": "问题", "content": "这个技术要解决的行业痛点（30字以内）"},
    {"icon": "🔬", "label": "技术壁垒", "content": "为什么别人做不了（30字以内）"},
    {"icon": "🎯", "label": "场景", "content": "市场切入路径（30字以内）"},
    {"icon": "💰", "label": "商业模式", "content": "怎么赚钱（30字以内）"},
    {"icon": "👥", "label": "团队", "content": "需要什么样的团队（30字以内）"}
  ]
}

只输出JSON，不要任何其他文字。`;

  const resp = await fetch(endpoint, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: model || 'gpt-4o-mini',
      messages: [{ role: 'user', content: prompt }],
      temperature: 0.8,
      max_tokens: 1500
    })
  });

  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`API 请求失败 (${resp.status}): ${err.slice(0, 200)}`);
  }

  const data = await resp.json();
  const content = data.choices?.[0]?.message?.content || '';
  // Extract JSON from response
  const jsonMatch = content.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('API 返回格式异常，请重试');

  const result = JSON.parse(jsonMatch[0]);
  return result;
}

// ============ Main Generate ============
async function generate() {
  const input = document.getElementById('techInput');
  const term = input.value.trim();

  if (!term) {
    input.focus();
    input.style.borderColor = 'var(--accent-rose)';
    setTimeout(() => { input.style.borderColor = ''; }, 1500);
    return;
  }

  const mode = document.getElementById('engineMode').value;
  const loading = document.getElementById('loadingOverlay');
  const results = document.getElementById('results');
  const btn = document.getElementById('btnGenerate');

  // Show loading
  results.classList.remove('active');
  loading.classList.add('active');
  btn.disabled = true;

  let data;
  try {
    if (mode === 'api') {
      data = await translateAPI(term);
    } else {
      // Slight delay for builtin to show the "thinking" animation
      await new Promise(r => setTimeout(r, 600));
      data = translateBuiltin(term);
    }
  } catch (err) {
    loading.classList.remove('active');
    btn.disabled = false;
    alert(`生成失败: ${err.message}`);
    return;
  }

  // Render
  renderResults(term, data);
  loading.classList.remove('active');
  results.classList.add('active');
  btn.disabled = false;

  // Scroll
  results.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderResults(term, data) {
  // One-liner
  document.getElementById('oneLiner').innerHTML =
    data.oneLiner.replace(term, `<span class="tech-name-highlight">${term}</span>`);

  // Scenarios
  const grid = document.getElementById('scenariosGrid');
  grid.innerHTML = '';
  data.scenarios.forEach((s, i) => {
    grid.innerHTML += `
      <div class="scenario-card anim-scale-in delay-${i + 1}">
        <div class="sc-num">SCENARIO 0${i + 1}</div>
        <div class="sc-title">${s.title}</div>
        <div class="sc-desc">${s.desc}</div>
        <span class="sc-market">${s.market}</span>
      </div>`;
  });

  // Pitch structure
  const flow = document.getElementById('pitchFlow');
  flow.innerHTML = '';
  data.pitch.forEach((p, i) => {
    flow.innerHTML += `
      <div class="pitch-step anim-fade-up delay-${i + 3}">
        <div class="step-icon">${p.icon}</div>
        <div class="step-label">${p.label}</div>
        <div class="step-content">${p.content}</div>
      </div>`;
  });

  // Re-trigger animations
  document.querySelectorAll('.anim-fade-up, .anim-scale-in').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight; // reflow
    el.style.animation = '';
  });
}

function resetAll() {
  document.getElementById('results').classList.remove('active');
  document.getElementById('techInput').value = '';
  document.getElementById('techInput').focus();
}

function copyContent(btn) {
  const term = document.getElementById('techInput').value.trim();
  const oneLiner = document.querySelector('.value-text')?.textContent || '';
  const scenarios = Array.from(document.querySelectorAll('.scenario-card')).map(c => {
    const title = c.querySelector('.sc-title')?.textContent || '';
    const desc = c.querySelector('.sc-desc')?.textContent || '';
    const market = c.querySelector('.sc-market')?.textContent || '';
    return `- ${title}：${desc}（${market}）`;
  }).join('\n');
  const pitch = Array.from(document.querySelectorAll('.pitch-step')).map(s => {
    const label = s.querySelector('.step-label')?.textContent || '';
    const content = s.querySelector('.step-content')?.textContent || '';
    return `【${label}】${content}`;
  }).join('\n');

  const text = `技术：${term}\n\n💡 一句话价值翻译\n${oneLiner}\n\n🎯 三大应用场景 & 市场规模\n${scenarios}\n\n📊 一页路演结构\n${pitch}`;

  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✅ 已复制';
    setTimeout(() => { btn.textContent = orig; }, 1800);
  });
}

    }
  });

  // Esc to exit presentation
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && document.body.classList.contains('present-mode')) {
      togglePresentation();
    }
  });
});
</script>
</body>
